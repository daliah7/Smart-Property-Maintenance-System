name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt
      - name: Run backend tests
        run: pytest tests/unit tests/integration

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install and build frontend
        run: cd frontend && npm install && npm run build

      - name: Build backend container
        run: docker build -t spms-backend:${{ github.ref_name }} -f backend/Dockerfile .
      - name: Build frontend container
        run: docker build -t spms-frontend:${{ github.ref_name }} -f frontend/Dockerfile frontend

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Smart Property Maintenance System ${{ github.ref_name }}

            ### Deployment
            ```bash
            docker compose up --build
            ```
            Backend: http://localhost:8000 | Swagger: http://localhost:8000/docs
            Frontend: http://localhost:5173

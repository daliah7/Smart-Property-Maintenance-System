services:
  - type: web
    name: smart-property-maintenance-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: frankfurt
    branch: main
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/spms.db
      - key: CORS_ORIGINS
        value: https://daliah7.github.io,http://localhost:5173,http://localhost:4173

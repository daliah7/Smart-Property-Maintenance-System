services:
  - type: web
    name: smart-property-maintenance-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    region: frankfurt
    branch: main
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # paste your Neon connection string in Render dashboard
      - key: CORS_ORIGINS
        value: https://daliah7.github.io

services:
  - type: web_service
    name: smart-property-maintenance-backend
    env: python
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-property-maintenance-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://smart-property-maintenance-frontend.onrender.com

databases:
  - name: smart-property-maintenance-db
    databaseName: spms
    user: spms
    region: oregon
